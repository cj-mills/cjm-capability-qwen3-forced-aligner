name: cjm-capability-qwen3-forced-aligner
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    - torch
    - qwen-asr
    # Substrate (cjm-substrate) is AUTO-INJECTED by install-all schema v2 — not listed here.
    - cjm-capability-primitives
    # Shared capability utils (torch release/OOM + HF Hub download/cache)
    - cjm-substrate-torch-utils
    - cjm-substrate-hf-utils
    - soundfile
    - numpy
    - fastcore
    # Worker deps
    - fastapi
    - uvicorn
    - psutil
    - httpx
